name: Sync Overlay
on:
  push:
    branches: [overlay]
    paths: [.github/**]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    if: github.repository == 'auroralabs-loci/mirror-template'
    runs-on: ubuntu-latest

    steps:
      - name: Sync overlay
        env:
          GH_TOKEN: ${{ secrets.MIRROR_REPOS_WRITE_PAT }}
          SYNC_ONLY: ''
        run: |
          gh auth setup-git # Setup gh as git credential helper

          tmpl_org="${GITHUB_REPOSITORY_OWNER}"
          tmpl_repo="${GITHUB_REPOSITORY}"

          sync_only="${SYNC_ONLY}"
          if [ -n "$sync_only" ]; then
            # Sync only the explicitly listed repos (comma or newline separated, short names ok)
            repos=$(echo "$sync_only" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' | while read -r r; do
              [[ "$r" == */* ]] && echo "$r" || echo "${tmpl_org}/${r}"
            done)
          else
            # Discover all repos with loci-mirror topic
            repos=$(gh search repos --topic=loci-mirror --owner="${tmpl_org}" --json fullName --jq '.[].fullName | select(. != "'"${tmpl_repo}"'")')
          fi

          if [ -z "$repos" ]; then
            echo "No repos to sync."
            exit 0
          fi

          echo "Found repos: ${repos}"

          for repo in $repos; do
            echo "::group::Syncing to ${repo}"

            gh repo clone "${repo}" target -- --depth=1
            cd target

            git config user.name "${GITHUB_ACTOR}"
            git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

            git ls-remote --heads origin

            if git ls-remote --exit-code --heads origin overlay &>/dev/null; then
              git fetch origin overlay
              git checkout overlay
            else
              git checkout -b overlay
            fi

            # Fetch template's overlay and restore .github from it (excluding customized files)
            git remote add template "https://github.com/${tmpl_repo}.git"
            git fetch template overlay
            git restore --source template/overlay -- '.github' ':(exclude).github/workflows/loci-analysis.yml'
            rm -f .github/workflows/sync-overlay.yml
            rm -f .github/workflows/template-setup.yml
            rm -f README.md

            if [ -z "$(git status --porcelain)" ]; then
              echo "No changes to sync."
            else
              git add .
              git commit -m "Sync overlay from ${tmpl_repo}"
              git push origin overlay --force
              echo "Successfully synced."
            fi

            cd ..
            rm -rf target

            echo "::endgroup::"
          done