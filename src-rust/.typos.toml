[files]
extend-exclude = ["*.cdx.xml", "*.drawio", "*.svg"]
ignore-dot     = true
ignore-files   = true
ignore-global  = true
ignore-hidden  = true
ignore-parent  = true
ignore-vcs     = true

[default]
binary                       = false
check-file                   = true
check-filename               = true
extend-ignore-identifiers-re = []
extend-ignore-re             = []
extend-ignore-words-re       = []
identifier-leading-digits    = false
ignore-hex                   = true
locale                       = "en"
unicode                      = true

[default.extend-identifiers]

[default.extend-words]

